<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小林的学习日志</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />

  <body>
    <div class="shell">

        </p>
        <ul class="s-nav">
          <li>
            <a href="#/notes" data-route="notes">
              <span class="nav-emoji" aria-hidden="true">📝</span>
              <span>学习笔记</span>
            </a>
          </li>
          <li>
            <a href="#/projects" data-route="projects">
              <span class="nav-emoji" aria-hidden="true">🛠️</span>

          <li>
            <a href="#/reading" data-route="reading">
              <span class="nav-emoji" aria-hidden="true">📚</span>

            </a>
          </li>
          <li>
            <a href="#/now" data-route="now">

              <span>近况</span>
            </a>
          </li>
        </ul>
        <div class="s-links">
          <a class="pill" href="https://github.com" target="_blank" rel="noreferrer">GitHub</a>
          <a class="pill" href="mailto:13022233853@163.com">邮箱</a>
        </div>
      </aside>

      <main class="content" id="app">
        <footer class="content-footer">
          <span>小林的学习日志</span>
          <span>© <span data-year></span></span>
        </footer>
      </main>
    </div>

    <script type="module" src="/src/scripts/site.js"></script>

</html>
