        - heading "🧠 RAG 检索质量为什么不稳定" [level=1] [ref=e68]
        - paragraph [ref=e69]: 2026-04-20 · AI 工程
        - paragraph [ref=e70]: 这篇笔记主要回答一个很现实的问题：明明检索链路没变，为什么换一批数据、换一个问题，结果质量就开始漂移。
        - generic [ref=e71]:
          - generic [ref=e72]: RAG
          - generic [ref=e73]: LangChain
          - generic [ref=e74]: 调优
      - generic [ref=e75]:
        - generic [ref=e76]:
          - heading "问题背景" [level=2] [ref=e77]
          - paragraph [ref=e78]: 最初的方案是标准向量检索，离线切分文档，在线直接把 query 向量化后召回相似 chunk。这个方案在 demo 数据上看起来很顺，但一上真实资料库，命中率就开始波动。
          - paragraph [ref=e79]: 问题不在某一个模型，而在检索链路对输入形态过于敏感。提问稍微口语化、上下文稍微缺一点，召回结果就会偏。
        - generic [ref=e80]:
          - heading "排查结论" [level=2] [ref=e81]
          - paragraph [ref=e82]: 影响最大的不是 embedding 模型本身，而是 chunk 切分策略和 query 改写质量。chunk 太大，召回内容泛；chunk 太小，语义上下文丢失。
          - paragraph [ref=e83]: 我后面加了 HyDE 和关键词补偿检索，混合召回后再做重排，质量明显稳定了一些。
        - generic [ref=e84]:
          - heading "当前做法" [level=2] [ref=e85]
          - paragraph [ref=e86]: 离线阶段按语义段落优先切分，再限制 token 上限，避免硬切句子造成上下文断裂。
          - paragraph [ref=e87]: 在线阶段先做 query 改写，再走向量检索 + 关键词检索，最后用重排模型压缩结果集。
